services:
  github-review-agent:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/app/.chroma
      - repo-cache:/app/.repos
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chroma-data:
  repo-cache:
